<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCADA Anomaly Detection Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0f1419;
            color: #e7e9ea;
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, #1a1f2e 0%, #252d3d 100%);
            padding: 20px;
            border-bottom: 1px solid #38444d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }
        
        .header h1 span {
            color: #1d9bf0;
        }
        
        .status-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }
        
        .status-normal { background: #00ba7c; }
        .status-warning { background: #ffd400; color: #000; }
        .status-alert { background: #f4212e; }
        
        .main {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
            padding: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }
        
        .panel {
            background: #16202a;
            border-radius: 12px;
            border: 1px solid #38444d;
            padding: 20px;
        }
        
        .panel h2 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #8899a6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .chart-container {
            height: 300px;
            margin-bottom: 20px;
        }
        
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .metric-card {
            background: #1e2a36;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        
        .metric-value {
            font-size: 28px;
            font-weight: 700;
            color: #1d9bf0;
        }
        
        .metric-label {
            font-size: 12px;
            color: #8899a6;
            margin-top: 5px;
        }
        
        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        button {
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        button:hover {
            transform: translateY(-1px);
        }
        
        .btn-primary { background: #1d9bf0; color: white; }
        .btn-primary:hover { background: #1a8cd8; }
        
        .btn-danger { background: #f4212e; color: white; }
        .btn-danger:hover { background: #dc1d28; }
        
        .btn-secondary { background: #38444d; color: white; }
        .btn-secondary:hover { background: #4a5568; }
        
        .alert-log {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .alert-item {
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            border-left: 4px solid;
        }
        
        .alert-normal { background: #0a1f15; border-color: #00ba7c; }
        .alert-low { background: #1a2634; border-color: #1d9bf0; }
        .alert-medium { background: #2a2010; border-color: #ffd400; }
        .alert-high { background: #2a1015; border-color: #f4212e; }
        .alert-critical { background: #3a0510; border-color: #f4212e; animation: pulse 1s infinite; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .alert-time {
            font-size: 11px;
            color: #8899a6;
        }
        
        .alert-message {
            margin-top: 4px;
            font-size: 13px;
        }
        
        .sensor-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .sensor-value {
            background: #1e2a36;
            padding: 8px;
            border-radius: 6px;
            text-align: center;
            font-size: 12px;
        }
        
        .sensor-value .name {
            color: #8899a6;
            font-size: 10px;
        }
        
        .sensor-value .value {
            font-weight: 600;
            margin-top: 2px;
        }
        
        .attack-select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #38444d;
            background: #1e2a36;
            color: #e7e9ea;
            margin-bottom: 10px;
        }
        
        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .connection-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #f4212e;
        }
        
        .connection-dot.connected {
            background: #00ba7c;
        }
        
        .model-status {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .model-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            background: #38444d;
        }
        
        .model-badge.loaded {
            background: #00ba7c;
        }
        
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #38444d;
            background: #1e2a36;
            color: #e7e9ea;
            margin-bottom: 10px;
        }
        
        label {
            display: block;
            font-size: 12px;
            color: #8899a6;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>SCADA <span>Anomaly Detection</span> Dashboard</h1>
        <div class="connection-status">
            <div class="connection-dot" id="connectionDot"></div>
            <span id="connectionStatus">Disconnected</span>
        </div>
        <div class="status-badge status-normal" id="systemStatus">NORMAL</div>
    </div>
    
    <div class="main">
        <div class="left-column">
            <!-- Sensor Chart -->
            <div class="panel">
                <h2>Sensor Readings (Real-Time)</h2>
                <div class="chart-container">
                    <canvas id="sensorChart"></canvas>
                </div>
            </div>
            
            <!-- Detection Scores -->
            <div class="panel">
                <h2>Detection Scores</h2>
                <div class="chart-container">
                    <canvas id="scoreChart"></canvas>
                </div>
            </div>
            
            <!-- Current Sensors -->
            <div class="panel">
                <h2>Current Sensor Values</h2>
                <div class="sensor-grid" id="sensorGrid">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>
        
        <div class="right-column">
            <!-- Model Status -->
            <div class="panel">
                <h2>Model Status</h2>
                <div class="model-status">
                    <span class="model-badge" id="ifStatus">IF: Not Loaded</span>
                    <span class="model-badge" id="transStatus">Trans: Not Loaded</span>
                </div>
                
                <div class="metrics-grid">
                    <div class="metric-card">
                        <div class="metric-value" id="totalSamples">0</div>
                        <div class="metric-label">Total Samples</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value" id="totalAnomalies">0</div>
                        <div class="metric-label">Anomalies</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value" id="anomalyRate">0%</div>
                        <div class="metric-label">Anomaly Rate</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value" id="avgLatency">0ms</div>
                        <div class="metric-label">Avg Latency</div>
                    </div>
                </div>
            </div>
            
            <!-- Controls -->
            <div class="panel">
                <h2>Simulator Controls</h2>
                <div class="controls">
                    <button class="btn-primary" onclick="startSimulator()">▶ Start Simulator</button>
                    <button class="btn-secondary" onclick="stopSimulator()">⏹ Stop Simulator</button>
                    
                    <label for="attackType">Attack Type:</label>
                    <select id="attackType" class="attack-select">
                        <option value="point_spike">Point Spike</option>
                        <option value="slow_drift">Slow Drift</option>
                        <option value="frozen">Frozen Sensor</option>
                        <option value="noise">Noise Injection</option>
                        <option value="replay">Replay Attack</option>
                    </select>
                    
                    <button class="btn-danger" onclick="injectAttack()">⚡ Inject Attack</button>
                    <button class="btn-secondary" onclick="resetSystem()">🔄 Reset</button>
                </div>
            </div>
            
            <!-- Alert Log -->
            <div class="panel">
                <h2>Alert Log</h2>
                <div class="alert-log" id="alertLog">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // ========== State ==========
        let ws = null;
        let sensorData = [];
        let scoreData = { if: [], transformer: [], ensemble: [] };
        const MAX_POINTS = 100;
        
        // ========== Charts ==========
        const sensorCtx = document.getElementById('sensorChart').getContext('2d');
        const sensorChart = new Chart(sensorCtx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    { label: 'LIT101', data: [], borderColor: '#1d9bf0', tension: 0.1, pointRadius: 0 },
                    { label: 'LIT301', data: [], borderColor: '#00ba7c', tension: 0.1, pointRadius: 0 },
                    { label: 'FIT101', data: [], borderColor: '#ffd400', tension: 0.1, pointRadius: 0 }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: false,
                scales: {
                    y: { grid: { color: '#38444d' } },
                    x: { grid: { color: '#38444d' }, display: false }
                },
                plugins: { legend: { labels: { color: '#e7e9ea' } } }
            }
        });
        
        const scoreCtx = document.getElementById('scoreChart').getContext('2d');
        const scoreChart = new Chart(scoreCtx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    { label: 'Ensemble Score', data: [], borderColor: '#f4212e', tension: 0.1, fill: true, backgroundColor: 'rgba(244,33,46,0.1)', pointRadius: 0 },
                    { label: 'Threshold', data: [], borderColor: '#ffd400', borderDash: [5,5], pointRadius: 0 }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: false,
                scales: {
                    y: { min: 0, max: 3, grid: { color: '#38444d' } },
                    x: { grid: { color: '#38444d' }, display: false }
                },
                plugins: { legend: { labels: { color: '#e7e9ea' } } }
            }
        });
        
        // ========== WebSocket ==========
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws`);
            
            ws.onopen = () => {
                document.getElementById('connectionDot').classList.add('connected');
                document.getElementById('connectionStatus').textContent = 'Connected';
            };
            
            ws.onclose = () => {
                document.getElementById('connectionDot').classList.remove('connected');
                document.getElementById('connectionStatus').textContent = 'Disconnected';
                setTimeout(connectWebSocket, 3000);
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'sample') {
                    handleSample(data);
                }
            };
        }
        
        function handleSample(data) {
            const time = new Date(data.timestamp * 1000).toLocaleTimeString();
            
            // Update sensor chart
            sensorChart.data.labels.push(time);
            sensorChart.data.datasets[0].data.push(data.sample[0]);
            sensorChart.data.datasets[1].data.push(data.sample[1]);
            sensorChart.data.datasets[2].data.push(data.sample[3]);
            
            if (sensorChart.data.labels.length > MAX_POINTS) {
                sensorChart.data.labels.shift();
                sensorChart.data.datasets.forEach(ds => ds.data.shift());
            }
            sensorChart.update('none');
            
            // Update score chart
            if (data.detection) {
                scoreChart.data.labels.push(time);
                scoreChart.data.datasets[0].data.push(data.detection.ensemble_score);
                scoreChart.data.datasets[1].data.push(1.0);  // Threshold line
                
                if (scoreChart.data.labels.length > MAX_POINTS) {
                    scoreChart.data.labels.shift();
                    scoreChart.data.datasets.forEach(ds => ds.data.shift());
                }
                scoreChart.update('none');
                
                // Update status
                updateStatus(data.detection);
                
                // Add to alert log if anomaly
                if (data.detection.is_anomaly) {
                    addAlert(time, data.detection);
                }
            }
            
            // Update sensor grid
            updateSensorGrid(data.sample);
        }
        
        function updateStatus(detection) {
            const statusBadge = document.getElementById('systemStatus');
            statusBadge.className = 'status-badge';
            
            if (detection.alert_level === 'CRITICAL') {
                statusBadge.classList.add('status-alert');
                statusBadge.textContent = '🚨 CRITICAL';
            } else if (detection.alert_level === 'HIGH' || detection.alert_level === 'MEDIUM') {
                statusBadge.classList.add('status-warning');
                statusBadge.textContent = '⚠️ ALERT';
            } else {
                statusBadge.classList.add('status-normal');
                statusBadge.textContent = 'NORMAL';
            }
        }
        
        function updateSensorGrid(sample) {
            const grid = document.getElementById('sensorGrid');
            const names = ['LIT101', 'LIT301', 'LIT401', 'FIT101', 'FIT201', 
                          'FIT301', 'FIT401', 'FIT501', 'FIT601', 'AIT201'];
            
            grid.innerHTML = sample.slice(0, 10).map((val, i) => `
                <div class="sensor-value">
                    <div class="name">${names[i] || 'S' + i}</div>
                    <div class="value">${val.toFixed(1)}</div>
                </div>
            `).join('');
        }
        
        function addAlert(time, detection) {
            const log = document.getElementById('alertLog');
            const levelClass = 'alert-' + detection.alert_level.toLowerCase();
            
            const alertHtml = `
                <div class="alert-item ${levelClass}">
                    <div class="alert-time">${time}</div>
                    <div class="alert-message">${detection.message}</div>
                </div>
            `;
            
            log.insertAdjacentHTML('afterbegin', alertHtml);
            
            // Keep only last 50 alerts
            while (log.children.length > 50) {
                log.removeChild(log.lastChild);
            }
        }
        
        // ========== API Calls ==========
        async function startSimulator() {
            await fetch('/simulator/start?samples_per_second=10&attack_probability=0.02', { method: 'POST' });
        }
        
        async function stopSimulator() {
            await fetch('/simulator/stop', { method: 'POST' });
        }
        
        async function injectAttack() {
            const attackType = document.getElementById('attackType').value;
            await fetch('/simulator/attack', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    attack_type: attackType,
                    duration_samples: 50,
                    target_sensor: 0,
                    intensity: 1.0
                })
            });
        }
        
        async function resetSystem() {
            await fetch('/simulator/reset', { method: 'POST' });
            await fetch('/reset', { method: 'POST' });
            document.getElementById('alertLog').innerHTML = '';
        }
        
        async function updateStats() {
            try {
                const resp = await fetch('/stats');
                const stats = await resp.json();
                
                document.getElementById('totalSamples').textContent = stats.total_detections.toLocaleString();
                document.getElementById('totalAnomalies').textContent = stats.total_anomalies.toLocaleString();
                document.getElementById('anomalyRate').textContent = (stats.anomaly_rate * 100).toFixed(1) + '%';
                document.getElementById('avgLatency').textContent = stats.avg_latency_ms.toFixed(1) + 'ms';
                
                // Model status
                const ifBadge = document.getElementById('ifStatus');
                const transBadge = document.getElementById('transStatus');
                
                ifBadge.textContent = 'IF: ' + (stats.if_loaded ? 'Loaded' : 'Not Loaded');
                ifBadge.className = 'model-badge' + (stats.if_loaded ? ' loaded' : '');
                
                transBadge.textContent = 'Trans: ' + (stats.transformer_loaded ? 'Loaded' : 'Not Loaded');
                transBadge.className = 'model-badge' + (stats.transformer_loaded ? ' loaded' : '');
                
            } catch (e) {
                console.error('Failed to fetch stats:', e);
            }
        }
        
        // ========== Init ==========
        connectWebSocket();
        setInterval(updateStats, 2000);
        updateStats();
    </script>
</body>
</html>
